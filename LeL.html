<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limited Edition Love</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5ede0;
    --blush: #e8b4a0;
    --rose: #c97b6e;
    --deep: #3a1f1a;
    --warm: #d4956a;
    --light: #faf4ec;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'DM Mono', monospace;
    color: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  .page {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
  }

  /* LEFT - FORM */
  .form-side {
    padding: 60px 50px;
    background: var(--light);
    border-right: 1px solid rgba(58,31,26,0.12);
    position: relative;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--blush);
  }

  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    line-height: 1.15;
    margin-bottom: 8px;
    color: var(--deep);
  }

  .form-title em {
    color: var(--rose);
    display: block;
  }

  .form-sub {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--warm);
    margin-bottom: 50px;
    text-transform: uppercase;
  }

  .field-group {
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 8px;
  }

  input, textarea, select {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--blush);
    padding: 10px 0;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--deep);
    outline: none;
    transition: border-color 0.3s;
    resize: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--rose);
  }

  input::placeholder, textarea::placeholder {
    color: rgba(58,31,26,0.25);
  }

  select {
    -webkit-appearance: none;
    cursor: pointer;
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .tags-input {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1.5px solid var(--blush);
    min-height: 42px;
    align-items: center;
    cursor: text;
  }

  .tag {
    background: var(--blush);
    color: var(--deep);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tag-remove {
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    opacity: 0.6;
  }

  .tag-remove:hover { opacity: 1; }

  #tag-field {
    border: none;
    padding: 0;
    width: 120px;
    font-size: 13px;
  }

  .color-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 10px 0;
    border-bottom: 1.5px solid var(--blush);
  }

  .color-opt {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s, border-color 0.2s;
  }

  .color-opt:hover { transform: scale(1.15); }
  .color-opt.selected { border-color: var(--deep); }

  .generate-btn {
    margin-top: 40px;
    width: 100%;
    padding: 18px;
    background: var(--deep);
    color: var(--cream);
    border: none;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-style: italic;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.3s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn::after {
    content: '→';
    position: absolute;
    right: -30px;
    top: 50%;
    transform: translateY(-50%);
    transition: right 0.3s;
  }

  .generate-btn:hover {
    background: var(--rose);
  }

  .generate-btn:hover::after { right: 24px; }
  .generate-btn:active { transform: scale(0.99); }

  /* RIGHT - OUTPUT */
  .output-side {
    padding: 60px 50px;
    background: var(--cream);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .output-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 40px;
  }

  .card {
    background: white;
    border-radius: 2px;
    padding: 40px;
    box-shadow: 0 2px 40px rgba(58,31,26,0.08);
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .card-corner {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--blush);
    text-transform: uppercase;
  }

  .card-heart {
    font-size: 32px;
    margin-bottom: 20px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .card-age-loc {
    font-size: 11px;
    color: var(--warm);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  .card-divider {
    width: 40px;
    height: 1.5px;
    background: var(--blush);
    margin-bottom: 24px;
  }

  .card-bio {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    line-height: 1.7;
    color: var(--deep);
    margin-bottom: 28px;
    flex: 1;
  }

  .card-section-title {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 10px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .card-tag {
    background: var(--cream);
    border: 1px solid var(--blush);
    color: var(--deep);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .card-vibe {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    margin-bottom: 24px;
  }

  .card-seeks {
    font-size: 12px;
    color: var(--warm);
    letter-spacing: 0.05em;
    padding-top: 16px;
    border-top: 1px solid var(--cream);
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    opacity: 0.4;
  }

  .empty-icon {
    font-size: 48px;
  }

  .empty-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
  }

  .empty-sub {
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* Decorative lines */
  .deco-line {
    position: absolute;
    background: var(--blush);
    opacity: 0.3;
  }

  @media (max-width: 900px) {
    .page { grid-template-columns: 1fr; }
    .output-side { position: relative; height: auto; }
  }
</style>
</head>
<body>

<div class="page">
  <!-- FORM SIDE -->
  <div class="form-side">
    <div class="brand">Limited Edition Love</div>

    <h1 class="form-title">Your Love<em>Profile.</em></h1>
    <p class="form-sub">Fill it in. See yourself.</p>

    <div class="row2">
      <div class="field-group">
        <label>First Name</label>
        <input type="text" id="name" placeholder="Your name..." oninput="liveUpdate()">
      </div>
      <div class="field-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="25" min="18" max="99" oninput="liveUpdate()">
      </div>
    </div>

    <div class="field-group">
      <label>Location</label>
      <input type="text" id="location" placeholder="City, Country..." oninput="liveUpdate()">
    </div>

    <div class="field-group">
      <label>Bio / About You</label>
      <textarea id="bio" rows="3" placeholder="Write something real about yourself..." oninput="liveUpdate()"></textarea>
    </div>

    <div class="field-group">
      <label>Relationship Vibe</label>
      <select id="vibe" onchange="liveUpdate()">
        <option value="">Select a vibe...</option>
        <option value="slow burn">Slow Burn</option>
        <option value="adventure first">Adventure First</option>
        <option value="homebody love">Homebody Love</option>
        <option value="deep connection">Deep Connection</option>
        <option value="chaotic good">Chaotic Good</option>
        <option value="intellectual spark">Intellectual Spark</option>
        <option value="soft life">Soft Life</option>
      </select>
    </div>

    <div class="field-group">
      <label>Interests / Passions (press Enter to add)</label>
      <div class="tags-input" id="tags-container" onclick="document.getElementById('tag-field').focus()">
        <input type="text" id="tag-field" placeholder="e.g. reading..." onkeydown="handleTag(event)">
      </div>
    </div>

    <div class="field-group">
      <label>I'm Looking For</label>
      <input type="text" id="seeking" placeholder="Someone who..." oninput="liveUpdate()">
    </div>

    <div class="field-group">
      <label>Favorite Color Palette</label>
      <div class="color-row" id="color-row">
        <div class="color-opt selected" style="background:#e8b4a0" data-color="#e8b4a0" data-name="blush" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#a0c4e8" data-color="#a0c4e8" data-name="sky" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#b4e8a0" data-color="#b4e8a0" data-name="sage" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#e8e0a0" data-color="#e8e0a0" data-name="honey" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#d4a0e8" data-color="#d4a0e8" data-name="lavender" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#e8a0c0" data-color="#e8a0c0" data-name="pink" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#3a1f1a" data-color="#3a1f1a" data-name="dark" onclick="selectColor(this)"></div>
      </div>
    </div>

    <button class="generate-btn" onclick="generateCard()">Create My Profile</button>
  </div>

  <!-- OUTPUT SIDE -->
  <div class="output-side">
    <div class="output-label">✦ Your Profile Card</div>

    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🫶</div>
      <div class="empty-text">Your card will appear here</div>
      <div class="empty-sub">Start filling in your details</div>
    </div>

    <div class="card" id="profile-card">
      <div class="card-corner">✦ Limited Edition</div>
      <div class="card-heart" id="card-heart">🤍</div>
      <div class="card-name" id="card-name">Your Name</div>
      <div class="card-age-loc" id="card-age-loc">—</div>
      <div class="card-divider" id="card-divider"></div>
      <div class="card-bio" id="card-bio">Your story goes here...</div>
      <div id="vibe-section">
        <div class="card-section-title">Current Vibe</div>
        <span class="card-vibe" id="card-vibe">—</span>
      </div>
      <div id="tags-section" style="margin-bottom:24px">
        <div class="card-section-title">Into</div>
        <div class="card-tags" id="card-tags"></div>
      </div>
      <div class="card-seeks" id="card-seeks"></div>
    </div>
  </div>
</div>

<script>
  let tags = [];
  let selectedColor = '#e8b4a0';
  let hasInteracted = false;

  function handleTag(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = e.target.value.trim();
      if (val && tags.length < 8) {
        tags.push(val);
        renderTags();
        e.target.value = '';
        liveUpdate();
      }
    }
  }

  function renderTags() {
    const container = document.getElementById('tags-container');
    const input = document.getElementById('tag-field');
    container.innerHTML = '';
    tags.forEach((tag, i) => {
      const el = document.createElement('div');
      el.className = 'tag';
      el.innerHTML = `${tag}<span class="tag-remove" onclick="removeTag(${i})">×</span>`;
      container.appendChild(el);
    });
    container.appendChild(input);
  }

  function removeTag(i) {
    tags.splice(i, 1);
    renderTags();
    liveUpdate();
  }

  function selectColor(el) {
    document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedColor = el.dataset.color;
    liveUpdate();
  }

  function liveUpdate() {
    const name = document.getElementById('name').value;
    const age = document.getElementById('age').value;
    const location = document.getElementById('location').value;
    const bio = document.getElementById('bio').value;
    const vibe = document.getElementById('vibe').value;
    const seeking = document.getElementById('seeking').value;

    if (!name && !bio && tags.length === 0) return;

    hasInteracted = true;
    showCard(name, age, location, bio, vibe, seeking);
  }

  function generateCard() {
    const name = document.getElementById('name').value;
    const age = document.getElementById('age').value;
    const location = document.getElementById('location').value;
    const bio = document.getElementById('bio').value;
    const vibe = document.getElementById('vibe').value;
    const seeking = document.getElementById('seeking').value;

    hasInteracted = true;
    showCard(name, age, location, bio, vibe, seeking);

    // Pulse animation
    const card = document.getElementById('profile-card');
    card.style.transform = 'scale(1.01)';
    setTimeout(() => card.style.transform = '', 300);
  }

  function showCard(name, age, location, bio, vibe, seeking) {
    const emptyState = document.getElementById('empty-state');
    const card = document.getElementById('profile-card');

    emptyState.style.display = 'none';
    card.classList.add('visible');

    // Update fields
    document.getElementById('card-name').textContent = name || 'Your Name';
    
    let ageLoc = [];
    if (age) ageLoc.push(age + ' yrs');
    if (location) ageLoc.push(location);
    document.getElementById('card-age-loc').textContent = ageLoc.join(' · ') || '—';

    document.getElementById('card-bio').textContent = bio || 'Your story goes here...';

    const vibeEl = document.getElementById('card-vibe');
    if (vibe) {
      vibeEl.textContent = vibe;
      vibeEl.style.background = selectedColor + '55';
      vibeEl.style.borderColor = selectedColor;
      vibeEl.style.border = '1px solid ' + selectedColor;
      document.getElementById('vibe-section').style.display = 'block';
    } else {
      document.getElementById('vibe-section').style.display = 'none';
    }

    const tagsEl = document.getElementById('card-tags');
    tagsEl.innerHTML = '';
    if (tags.length > 0) {
      tags.forEach(t => {
        const span = document.createElement('span');
        span.className = 'card-tag';
        span.textContent = t;
        tagsEl.appendChild(span);
      });
      document.getElementById('tags-section').style.display = 'block';
    } else {
      document.getElementById('tags-section').style.display = 'none';
    }

    if (seeking) {
      document.getElementById('card-seeks').textContent = '✦ Seeking: ' + seeking;
      document.getElementById('card-seeks').style.display = 'block';
    } else {
      document.getElementById('card-seeks').style.display = 'none';
    }

    // Color theming
    document.getElementById('card-divider').style.background = selectedColor;
    document.getElementById('card-heart').textContent = getHeart(selectedColor);
  }

  function getHeart(color) {
    const hearts = { '#e8b4a0':'🧡', '#a0c4e8':'💙', '#b4e8a0':'💚', '#e8e0a0':'💛', '#d4a0e8':'💜', '#e8a0c0':'🩷', '#3a1f1a':'🖤' };
    return hearts[color] || '🤍';
  }
</script>
</body>
</html>
